name: Build & Typecheck

# Runs on every push and PR so a missing/incorrect secret fails fast in CI
# instead of surfacing later as a blank page in production.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Server-side Firebase Admin config (read via process.env in server.ts)
          FB_PROJECTID: ${{ secrets.FB_PROJECTID }}
          FB_FIRESTOREDATABASEID: ${{ secrets.FB_FIRESTOREDATABASEID }}

          # Client-side Firebase config — MUST be VITE_-prefixed so Vite bundles
          # them into the frontend build (see src/vite-env.d.ts / src/firebase.ts)
          VITE_FB_APIKEY: ${{ secrets.FB_APIKEY }}
          VITE_FB_APPID: ${{ secrets.FB_APPID }}
          VITE_FB_AUTHDOMAIN: ${{ secrets.FB_AUTHDOMAIN }}
          VITE_FB_MSGSENDERID: ${{ secrets.FB_MSGSENDERID }}
          VITE_FB_PROJECTID: ${{ secrets.FB_PROJECTID }}
          VITE_FB_STORAGEBUCKET: ${{ secrets.FB_STORAGEBUCKET }}
          VITE_FB_FIRESTOREDATABASEID: ${{ secrets.FB_FIRESTOREDATABASEID }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # --------------------------------------------------------------------------
  # No deploy job is included here on purpose: this repo was scaffolded by
  # Google AI Studio, which typically builds and deploys to Cloud Run itself
  # (GEMINI_API_KEY / APP_URL get injected automatically in that flow — see
  # .env.example). If you're self-hosting instead of using AI Studio's deploy
  # pipeline, add a deploy step below using the `dist/` artifact produced
  # above plus the GEMINI_API_KEY secret at runtime (never at build time,
  # since it must stay server-side only), e.g. for Cloud Run:
  #
  #   - name: Deploy to Cloud Run
  #     uses: google-github-actions/deploy-cloudrun@v2
  #     with:
  #       service: your-service-name
  #       image: your-image
  #     env:
  #       GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  # --------------------------------------------------------------------------
