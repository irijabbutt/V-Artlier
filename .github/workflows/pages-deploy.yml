name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_FB_APIKEY: ${{ secrets.FB_APIKEY }}
          VITE_FB_APPID: ${{ secrets.FB_APPID }}
          VITE_FB_AUTHDOMAIN: ${{ secrets.FB_AUTHDOMAIN }}
          VITE_FB_MSGSENDERID: ${{ secrets.FB_MSGSENDERID }}
          VITE_FB_PROJECTID: ${{ secrets.FB_PROJECTID }}
          VITE_FB_STORAGEBUCKET: ${{ secrets.FB_STORAGEBUCKET }}
          VITE_FB_FIRESTOREDATABASEID: ${{ secrets.FB_FIRESTOREDATABASEID }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          commit_message: Deploy V-Artlier GitHub Pages
